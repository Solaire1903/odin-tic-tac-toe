<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>
  <div class="game-grid">
    <button type="button" class="game-cell" data-row="0" data-col="0"></button>
    <button type="button" class="game-cell" data-row="0" data-col="1"></button>
    <button type="button" class="game-cell" data-row="0" data-col="2"></button>
    <button type="button" class="game-cell" data-row="1" data-col="0"></button>
    <button type="button" class="game-cell" data-row="1" data-col="1"></button>
    <button type="button" class="game-cell" data-row="1" data-col="2"></button>
    <button type="button" class="game-cell" data-row="2" data-col="0"></button>
    <button type="button" class="game-cell" data-row="2" data-col="1"></button>
    <button type="button" class="game-cell" data-row="2" data-col="2"></button>
  </div>
</body>

</html>
