<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>

<body>
  <dialog class="name-form">
    <div>
      <p>Enter your names:</p>
      <form action="" method="get">
        <label for="player-one-name">Player 1:</label>
        <input type="text" id="player-one-name" maxlength="20" required>
        <label for="player-two-name">Player 2:</label>
        <input type="text" id="player-two-name" maxlength="20" required>
        <button type="submit" class="start-game-button">Start Game</button>
      </form>
    </div>
  </dialog>

  <p class="game-notification"></p>

  <div class="game-grid">
    <button type="button" class="game-cell" data-row="0" data-col="0"></button>
    <button type="button" class="game-cell" data-row="0" data-col="1"></button>
    <button type="button" class="game-cell" data-row="0" data-col="2"></button>
    <button type="button" class="game-cell" data-row="1" data-col="0"></button>
    <button type="button" class="game-cell" data-row="1" data-col="1"></button>
    <button type="button" class="game-cell" data-row="1" data-col="2"></button>
    <button type="button" class="game-cell" data-row="2" data-col="0"></button>
    <button type="button" class="game-cell" data-row="2" data-col="1"></button>
    <button type="button" class="game-cell" data-row="2" data-col="2"></button>
  </div>

  <dialog class="results">
    <p></p>
    <button type="button" class="new-game-button">Start New Game</button>
  </dialog>
</body>

</html>
